<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account | PHP Auth Kit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <section class="shell" aria-label="Create account">
            <div class="brand">
                <p class="eyebrow">PHP Auth Kit</p>
                <h1>Start with a real token.</h1>
                <p class="lead">Create a user through the API and move straight into an authenticated dashboard backed by the saved Sanctum bearer token.</p>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Create account</h2>
                        <p class="panel-subtitle">Laravel will validate the fields and return a token.</p>
                    </div>
                </div>

                <form class="form" id="registerForm">
                    <div class="field">
                        <label for="name">Name</label>
                        <input id="name" name="name" type="text" autocomplete="name" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" autocomplete="email" required>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                        <p class="helper">Minimum 8 characters.</p>
                    </div>

                    <button class="button button-primary" type="submit">Create account</button>
                </form>

                <div id="status" class="status" role="status" aria-live="polite"></div>

                <div class="divider"></div>

                <p class="helper">Already registered? <a href="login.html">Sign in</a>.</p>

                <details class="api-settings">
                    <summary>API settings</summary>
                    <div class="field">
                        <label for="apiBase">API base URL</label>
                        <input id="apiBase" type="url" inputmode="url">
                    </div>
                </details>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script>initRegister();</script>
</body>
</html>
